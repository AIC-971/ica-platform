<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — ICA Plateforme</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE;
  --red: #E24B4A; --red-light: #FCEBEB;
  --text: #1a1a18; --text-muted: #6b6b68; --bg: #F8F7F4; --surface: #fff;
  --border: rgba(0,0,0,0.1);
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  padding: 20px;
}
.login-wrapper {
  width: 100%; max-width: 400px;
}
.login-logo {
  text-align: center; margin-bottom: 32px;
}
.logo-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px; background: var(--green); color: #fff;
  font-weight: 800; font-size: 18px; border-radius: 14px;
  margin-bottom: 12px;
}
.login-title { font-size: 22px; font-weight: 700; color: var(--text); }
.login-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.4px; margin-bottom: 6px;
}
.form-group input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 15px; color: var(--text);
  background: var(--bg); outline: none; font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-group input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px var(--green-light);
  background: var(--surface);
}
.btn-login {
  width: 100%; padding: 13px; background: var(--green); color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
  margin-top: 8px;
}
.btn-login:hover { background: var(--green-dark); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  display: none; background: var(--red-light); color: var(--red);
  border-radius: 8px; padding: 10px 14px; font-size: 13px;
  margin-top: 14px; text-align: center;
}
.error-msg.show { display: block; }

.card {
  background: var(--surface); border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  padding: 32px;
}
.login-footer {
  text-align: center; margin-top: 20px;
  font-size: 12px; color: var(--text-muted);
}
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media(max-width: 420px) { .card { padding: 24px; } }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-logo">
    <div class="logo-badge">ICA</div>
    <div class="login-title">Immo Conseil Antilles</div>
    <div class="login-sub">Plateforme de gestion syndic</div>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Adresse email</label>
      <input type="email" id="login-email" placeholder="votre@email.com" autocomplete="email" autofocus>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="•••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <div class="login-footer">
    ICA Plateforme &copy; 2026 — Accès sécurisé
  </div>
</div>

<script>
const existingToken = sessionStorage.getItem('ica_token');
if (existingToken) {
  fetch('/api/login?action=verify', {
    headers: { 'Authorization': 'Bearer ' + existingToken }
  }).then(r => r.json()).then(d => {
    if (d.valid) redirectByRole(d.user.role);
  }).catch(() => {});
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');

  if (!email || !password) { showError('Veuillez remplir tous les champs'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Connexion...';
  errEl.classList.remove('show');

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) { showError(data.error || 'Identifiants incorrects'); return; }
    sessionStorage.setItem('ica_token', data.token);
    sessionStorage.setItem('ica_user', JSON.stringify(data.user));
    redirectByRole(data.user.role);
  } catch(e) {
    showError('Erreur de connexion. Vérifiez le réseau.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Se connecter';
  }
}

function redirectByRole(role) {
  if (role === 'direction') { window.location.href = '/'; }
  else if (role === 'commercial') { window.location.href = '/module8_commissions.html?mode=commercial'; }
  else { window.location.href = '/'; }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
